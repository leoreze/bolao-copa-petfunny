services:
  postgres:
    image: postgres:16-alpine
    container_name: bolao-copa-petfunny-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: bolao_copa_petfunny
    ports:
      - "5432:5432"
    volumes:
      - bolao_copa_petfunny_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d bolao_copa_petfunny"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  bolao_copa_petfunny_data:
